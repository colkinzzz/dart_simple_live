name: Build Android arm64 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Create temporary signing key
        run: |
          keytool -genkeypair -v \
            -keystore simple_live_app/android/upload-keystore.jks \
            -storepass android \
            -keypass android \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Simple Live,O=Local,C=CN"

          cat > simple_live_app/android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=android
          keyPassword=android
          keyAlias=upload
          EOF

      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-arm64-v8a-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
